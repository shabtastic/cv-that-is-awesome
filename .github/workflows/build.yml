name: Build CV
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build cv-full.pdf
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          latexmk_use_xelatex: true
          pre_compile: |
            cp config/full.tex cv-preset.tex
            xelatex -interaction=nonstopmode cv.tex || true
            biber cv
            xelatex -interaction=nonstopmode cv.tex
            xelatex -interaction=nonstopmode cv.tex
          post_compile: mv cv.pdf cv-full.pdf
      - name: Build cv-industry.pdf
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          latexmk_use_xelatex: true
          pre_compile: |
            cp config/industry.tex cv-preset.tex
            xelatex -interaction=nonstopmode cv.tex || true
            biber cv
            xelatex -interaction=nonstopmode cv.tex
            xelatex -interaction=nonstopmode cv.tex
          post_compile: mv cv.pdf cv-industry.pdf
      - name: Build cv-speaking.pdf
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          latexmk_use_xelatex: true
          pre_compile: |
            cp config/speaking.tex cv-preset.tex
            xelatex -interaction=nonstopmode cv.tex || true
            biber cv
            xelatex -interaction=nonstopmode cv.tex
            xelatex -interaction=nonstopmode cv.tex
          post_compile: mv cv.pdf cv-speaking.pdf
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cv-${{ github.sha }}
          name: "CV build ${{ github.sha }}"
          files: |
            cv-full.pdf
            cv-industry.pdf
            cv-speaking.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
