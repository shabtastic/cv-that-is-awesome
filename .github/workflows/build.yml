name: Build CV
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build cv-full.pdf
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          latexmk_use_xelatex: true
          pre_compile: cp config/full.tex cv-preset.tex
          post_compile: mv cv.pdf cv-full.pdf
      - name: Build cv-full-public.pdf
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          latexmk_use_xelatex: true
          pre_compile: cp config/full-public.tex cv-preset.tex
          post_compile: |
            mv cv.pdf cv-full-public.pdf
            cp cv-full-public.pdf shabnam-hakimi-cv.pdf
      - name: Build cv-industry.pdf
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          latexmk_use_xelatex: true
          pre_compile: cp config/industry.tex cv-preset.tex
          post_compile: mv cv.pdf cv-industry.pdf
      - name: Build cv-speaking.pdf
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          latexmk_use_xelatex: true
          pre_compile: cp config/speaking.tex cv-preset.tex
          post_compile: mv cv.pdf cv-speaking.pdf
      - name: Build resume.pdf
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          latexmk_use_xelatex: true
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cv-${{ github.sha }}
          name: "CV build ${{ github.sha }}"
          files: |
            cv-full.pdf
            cv-full-public.pdf
            cv-industry.pdf
            cv-speaking.pdf
            shabnam-hakimi-cv.pdf
            resume.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync CV to website repo
        env:
          WEBSITE_DEPLOY_TOKEN: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${WEBSITE_DEPLOY_TOKEN}@github.com/shabtastic/shabweb.git /tmp/shabweb
          cp shabnam-hakimi-cv.pdf /tmp/shabweb/shabnam-hakimi-cv.pdf
          cd /tmp/shabweb
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add shabnam-hakimi-cv.pdf
          git diff --cached --quiet || git commit -m "cv: sync shabnam-hakimi-cv.pdf from cv repo ($(date -u +%Y-%m-%d))"
          git push
