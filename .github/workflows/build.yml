name: Build CV

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Build all three preset PDFs sequentially.
      # Each make target writes cv-preset.tex then compiles cv.tex → cv.pdf
      # then renames to the preset-specific filename.
      # -----------------------------------------------------------------------

      - name: Build cv-full.pdf
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          latexmk_use_xelatex: false
          pre_compile: cp config/full.tex cv-preset.tex
          post_compile: |
            biber cv
            xelatex cv.tex
            xelatex cv.tex
            mv cv.pdf cv-full.pdf

      - name: Build cv-industry.pdf
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          latexmk_use_xelatex: false
          pre_compile: cp config/industry.tex cv-preset.tex
          post_compile: |
            biber cv
            xelatex cv.tex
            xelatex cv.tex
            mv cv.pdf cv-industry.pdf

      - name: Build cv-speaking.pdf
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          latexmk_use_xelatex: false
          pre_compile: cp config/speaking.tex cv-preset.tex
          post_compile: |
            biber cv
            xelatex cv.tex
            xelatex cv.tex
            mv cv.pdf cv-speaking.pdf

      # -----------------------------------------------------------------------
      # Create a GitHub Release and upload all three PDFs as assets.
      # Tag is derived from the commit SHA for traceability.
      # -----------------------------------------------------------------------

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cv-${{ github.sha }}
          name: "CV build ${{ github.sha }}"
          files: |
            cv-full.pdf
            cv-industry.pdf
            cv-speaking.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}